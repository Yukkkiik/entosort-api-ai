name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/entosort/api-ai
            git pull origin main
            docker build -t entosort-api .
            docker stop entosort-api || true
            docker rm entosort-api || true
            docker run -d \
              --name entosort-api \
              --restart unless-stopped \
              -p 8000:8000 \
              entosort-api
            docker image prune -f